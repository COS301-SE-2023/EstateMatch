<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">
    <link rel="stylesheet" href="home.page.scss">
  </head>

  <app-header>
  </app-header>

  <body>
    <div id="board"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script>
      /* LikeCarousel (c) 2019 Simone P.M. github.com/simonepm - Licensed MIT */
  
      class Carousel {
        constructor(element) {
          this.board = element;
          this.images = [
            'https://thumbor.forbes.com/thumbor/fit-in/900x510/https://www.forbes.com/home-improvement/wp-content/uploads/2022/07/download-23.jpg',
            'https://images.pexels.com/photos/106399/pexels-photo-106399.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1',
            'https://images.pexels.com/photos/323780/pexels-photo-323780.jpeg',
            'https://images.pexels.com/photos/1396122/pexels-photo-1396122.jpeg'
          ];
          this.areas = ['Ballito, KZN', 'Salt Rock, KZN', 'Kyalami, Gauteng', 'Vereeniging, Gauteng'];
          this.descriptions = [
            'R5 000 000. Three Bedroom and Two Bathrooms.',
            'R10 000 000. Four Bedroom and 3 Bathrooms. With an indoor pool.',
            'R3 000 000. 2 Bedroom house in a good neighbourhood. 24hr Security.',
            'R1 500 000. 3 Bedroom and One bathroom, with a pool.'
          ];
  
          // add first two cards programmatically
          this.push();
          this.push();
  
          // handle gestures
          this.handle();
        }
  
        handle() {
          // list all cards
          this.cards = this.board.querySelectorAll('.card');
  
          // get top card
          this.topCard = this.cards[this.cards.length - 1];
  
          // get next card
          this.nextCard = this.cards[this.cards.length - 2];
  
          // if at least one card is present
          if (this.cards.length > 0) {
            // set default top card position and scale
            this.topCard.style.transform =
              'translate(-50%, -50%) rotate(0deg) rotateY(0deg) scale(1)';
  
            // destroy previous Hammer instance, if present
            if (this.hammer) this.hammer.destroy();
  
            // listen for tap and pan gestures on top card
            this.hammer = new Hammer(this.topCard);
            this.hammer.add(new Hammer.Tap());
            this.hammer.add(
              new Hammer.Pan({
                position: Hammer.position_ALL,
                threshold: 0,
              })
            );
  
            // pass events data to custom callbacks
            this.hammer.on('tap', (e) => {
              this.onTap(e);
            });
            this.hammer.on('pan', (e) => {
              this.onPan(e);
            });
          }
        }
  
        onTap(e) {
          // get finger position on top card
          let propX =
            (e.center.x - e.target.getBoundingClientRect().left) /
            e.target.clientWidth;
  
          // get rotation degrees around Y axis (+/- 15) based on finger position
          let rotateY = 15 * (propX < 0.05 ? -1 : 1);
  
          // enable transform transition
          this.topCard.style.transition = 'transform 100ms ease-out';
  
          // apply rotation around Y axis
          this.topCard.style.transform = `translate(-50%, -50%) rotate(0deg) rotateY(${rotateY}deg) scale(1)`;
  
          // wait for transition end
          setTimeout(() => {
            // reset transform properties
            this.topCard.style.transform = `translate(-50%, -50%) rotate(0deg) rotateY(0deg) scale(1)`;
          }, 100);
        }
  
        onPan(e) {
          if (!this.isPanning) {
            this.isPanning = true;
  
            // remove transition properties
            this.topCard.style.transition = null;
            if (this.nextCard) this.nextCard.style.transition = null;
  
            // get top card coordinates in pixels
            let style = window.getComputedStyle(this.topCard);
            let mx = style.transform.match(/^matrix\((.+)\)$/);
            this.startPosX = mx ? parseFloat(mx[1].split(', ')[4]) : 0;
            this.startPosY = mx ? parseFloat(mx[1].split(', ')[5]) : 0;
  
            // get top card bounds
            let bounds = this.topCard.getBoundingClientRect();
  
            // get finger position on top card, top (1) or bottom (-1)
            this.isDraggingFrom =
              (e.center.y - bounds.top) > this.topCard.clientHeight / 2 ? -1 : 1;
          }
  
          // get new coordinates
          let posX = e.deltaX + this.startPosX;
          let posY = e.deltaY + this.startPosY;
  
          // get ratio between swiped pixels and the axes
          let propX = e.deltaX / this.board.clientWidth;
          let propY = e.deltaY / this.board.clientHeight;
  
          // get swipe direction, left (-1) or right (1)
          let dirX = e.deltaX < 0 ? -1 : 1;
  
          // get degrees of rotation, between 0 and +/- 45
          let deg = this.isDraggingFrom * dirX * Math.abs(propX) * 45;
  
          // get scale ratio, between .95 and 1
          let scale = (95 + 5 * Math.abs(propX)) / 100;
  
          // move and rotate top card
          this.topCard.style.transform = `translate(${posX}px, ${posY}px) rotate(${deg}deg) rotateY(0deg) scale(1)`;
  
          // scale up next card
          if (this.nextCard)
            this.nextCard.style.transform = `translate(-50%, -50%) rotate(0deg) rotateY(0deg) scale(${scale})`;
  
          if (e.isFinal) {
            this.isPanning = false;
            let successful = false;
  
            // set back transition properties
            this.topCard.style.transition = 'transform 200ms ease-out';
            if (this.nextCard)
              this.nextCard.style.transition = 'transform 100ms linear';
  
            // check threshold and movement direction
            if (propX > 0.25 && e.direction === Hammer.DIRECTION_RIGHT) {
              successful = true;
              // get right border position
              posX = this.board.clientWidth;
            } else if (
              propX < -0.25 &&
              e.direction === Hammer.DIRECTION_LEFT
            ) {
              successful = true;
              // get left border position
              posX = -(this.board.clientWidth + this.topCard.clientWidth);
            } else if (propY < -0.25 && e.direction === Hammer.DIRECTION_UP) {
              successful = true;
              // get top border position
              posY = -(this.board.clientHeight + this.topCard.clientHeight);
            }
  
            if (successful) {
              // throw card in the chosen direction
              this.topCard.style.transform = `translate(${posX}px, ${posY}px) rotate(${deg}deg)`;
  
              // wait transition end
              setTimeout(() => {
                // remove swiped card
                this.board.removeChild(this.topCard);
                // add new card
                this.push();
                // handle gestures on new top card
                this.handle();
              }, 200);
            } else {
              // reset cards position and size
              this.topCard.style.transform = `translate(-50%, -50%) rotate(0deg) rotateY(0deg) scale(1)`;
              if (this.nextCard)
                this.nextCard.style.transform = `translate(-50%, -50%) rotate(0deg) rotateY(0deg) scale(0.95)`;
            }
          }
        }
  
        push() {
          const index = Math.floor(Math.random() * this.images.length);
          const card = document.createElement('div');
          card.classList.add('card');
  
          const cardContent = document.createElement('div');
          cardContent.classList.add('card-content');
  
          const cardImage = document.createElement('div');
          cardImage.classList.add('card-image');
          cardImage.style.backgroundImage = `url(${this.images[index]})`;
  
          const cardTitle = document.createElement('div');
          cardTitle.classList.add('card-title');
          cardTitle.textContent = this.areas[index];
  
          const cardSubtitle = document.createElement('div');
          cardSubtitle.classList.add('card-subtitle');
          cardSubtitle.textContent = this.descriptions[index];
  
          cardContent.appendChild(cardImage);
          cardContent.appendChild(cardTitle);
          cardContent.appendChild(cardSubtitle);
          card.appendChild(cardContent);
  
          this.board.insertBefore(card, this.board.firstChild);
        }
      }
  
      const board = document.getElementById('board');
      const carousel = new Carousel(board);
    </script>
  </body>

  <div id="button-container" style="text-align:center;">
    <button id="dislike-button" (click) = "dislikeHouse()" style="background-color:#F0422A; height:60px; border-color:#F0422A ;border-radius: 100%; width:60px;">
      <span style="font-size: 1.7em; color:white">
        <i class="fas fa-times"></i>
    </span>
    </button>
    &nbsp;
    <button id="like-button" (click) = "likeHouse()" style="background-color:#67C390; height:60px; border-color: #67C390;border-radius: 100%; width:60px;">
      <span style="font-size: 1.7em; color:white">
      <i class="fas fa-heart"></i>
    </span>
    </button>
  </div>

  <app-footer>
    
  </app-footer>
</html>
